name: CloudFreeze CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write  # For OIDC-based AWS auth

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Package Lambda Functions (required for terraform init)
        run: make package

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  test:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Dependencies
        run: pip install -r requirements-dev.txt

      - name: Run Tests
        run: python -m pytest tests/ -v --tb=short
        env:
          QUARANTINE_SG_ID: sg-test
          NORMAL_SG_ID: sg-normal
          SNS_TOPIC_ARN: arn:aws:sns:us-east-1:123456789012:test
          DYNAMODB_TABLE: test-incidents
          KMS_RATE_TABLE: test-kms-rate
          FORENSIC_LAMBDA_ARN: ""
          QUARANTINE_NACL_ID: ""
          FORENSIC_S3_BUCKET: test-forensic-bucket
          ENABLE_MEMORY_FORENSICS: "false"

  package:
    name: Build Lambda Packages
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Package Lambda Functions
        run: make package

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lambda-packages
          path: lambda/*.zip
          retention-days: 5
